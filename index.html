<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>German Vocabulary Trainer</title>
  <style>
    :root {
      --bg: #111827;
      --card: #1f2937;
      --text: #f9fafb;
      --muted: #9ca3af;
      --accent: #60a5fa;
      --good: #22c55e;
      --bad: #ef4444;
      --btn: #374151;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: radial-gradient(circle at top, #1e3a8a, var(--bg));
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    main {
      width: min(760px, 100%);
      background: rgba(31, 41, 55, 0.92);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 28px;
      box-shadow: 0 30px 80px rgba(0,0,0,0.35);
    }
    h1 { margin: 0 0 8px; font-size: clamp(28px, 5vw, 44px); }
    .subtitle { color: var(--muted); margin-top: 0; }
    .controls {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin: 24px 0;
    }
    select, button {
      border: 0;
      border-radius: 14px;
      padding: 14px;
      font-size: 16px;
    }
    select {
      background: #111827;
      color: var(--text);
      border: 1px solid rgba(255,255,255,0.12);
    }
    .word-card {
      background: rgba(17, 24, 39, 0.75);
      border-radius: 20px;
      padding: 26px;
      margin: 20px 0;
    }
    #word { font-size: clamp(32px, 7vw, 56px); margin: 0; }
    #meta, #example, #status { color: var(--muted); }
    .choices {
      display: grid;
      gap: 12px;
      margin-top: 18px;
    }
    .choices button {
      background: var(--btn);
      color: var(--text);
      cursor: pointer;
      text-align: left;
      transition: transform .1s, background .15s;
    }
    .choices button:hover { transform: translateY(-1px); background: #4b5563; }
    .choices button.correct { background: var(--good); color: #052e16; }
    .choices button.wrong { background: var(--bad); color: #450a0a; }
    .score {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      flex-wrap: wrap;
      color: var(--muted);
      margin-top: 18px;
    }
    .actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 18px;
    }
    .actions button {
      background: var(--accent);
      color: #082f49;
      font-weight: 700;
      cursor: pointer;
      width: auto;
    }
  </style>
</head>
<body>
  <main>
    <h1>German Vocabulary Trainer</h1>
    <p class="subtitle">Multiple-choice German practice. Works online and can be installed as a simple web app.</p>

    <section class="controls">
      <select id="level">
        <option value="all">All levels</option>
        <option value="A1">A1</option>
        <option value="A2">A2</option>
        <option value="B1">B1</option>
        <option value="B2">B2</option>
      </select>

      <select id="pos">
        <option value="all">All word types</option>
        <option value="noun">Nouns</option>
        <option value="verb">Verbs</option>
        <option value="adjective">Adjectives</option>
        <option value="adverb">Adverbs</option>
        <option value="phrase">Phrases</option>
      </select>

      <select id="direction">
        <option value="de-en">German → English</option>
        <option value="en-de">English → German</option>
      </select>
    </section>

    <section class="word-card">
      <p id="meta"></p>
      <h2 id="word">Loading...</h2>
      <p id="example"></p>
      <div id="choices" class="choices"></div>
      <p id="status"></p>

      <div class="actions">
        <button onclick="nextQuestion()">Skip</button>
        <button onclick="resetScore()">Reset score</button>
      </div>
    </section>

    <section class="score">
      <span>Score: <strong id="score">0</strong> / <strong id="total">0</strong></span>
      <span>Best streak: <strong id="best">0</strong></span>
      <span>Current streak: <strong id="streak">0</strong></span>
    </section>
  </main>

  <script>
    let words = [];
    let current = null;
    let locked = false;
    let score = Number(localStorage.getItem("score") || 0);
    let total = Number(localStorage.getItem("total") || 0);
    let streak = Number(localStorage.getItem("streak") || 0);
    let best = Number(localStorage.getItem("best") || 0);

    const $ = id => document.getElementById(id);

    async function loadWords() {
      try {
        const response = await fetch("words.json");
        words = await response.json();
        updateScore();
        nextQuestion();
      } catch (error) {
        $("word").textContent = "Could not load words.json";
        $("status").textContent = "Make sure words.json is in the same folder as index.html.";
      }
    }

    function filteredWords() {
      const level = $("level").value;
      const pos = $("pos").value;
      return words.filter(w =>
        (level === "all" || w.level === level) &&
        (pos === "all" || w.pos === pos)
      );
    }

    function shuffle(array) {
      return [...array].sort(() => Math.random() - 0.5);
    }

    function nextQuestion() {
      locked = false;
      const pool = filteredWords();

      if (pool.length < 4) {
        $("word").textContent = "Need at least 4 words for this filter.";
        $("choices").innerHTML = "";
        $("example").textContent = "";
        $("meta").textContent = "";
        $("status").textContent = "";
        return;
      }

      current = pool[Math.floor(Math.random() * pool.length)];
      const direction = $("direction").value;
      const wrong = shuffle(pool.filter(w => w.id !== current.id)).slice(0, 3);
      const choices = shuffle([current, ...wrong]);

      $("meta").textContent = `${current.level} · ${current.pos} · ${current.topic || "general"}`;
      $("word").textContent = direction === "de-en" ? current.german : current.english;
      $("example").textContent = current.example || "";
      $("status").textContent = "";
      $("choices").innerHTML = "";

      choices.forEach(choice => {
        const btn = document.createElement("button");
        btn.textContent = direction === "de-en" ? choice.english : choice.german;
        btn.onclick = () => choose(btn, choice);
        $("choices").appendChild(btn);
      });
    }

    function choose(button, choice) {
      if (locked) return;
      locked = true;

      total++;

      if (choice.id === current.id) {
        score++;
        streak++;
        best = Math.max(best, streak);
        button.classList.add("correct");
        $("status").textContent = "Correct.";
      } else {
        streak = 0;
        button.classList.add("wrong");
        $("status").textContent = `Wrong. Correct answer: ${$("direction").value === "de-en" ? current.english : current.german}`;
        [...$("choices").children].forEach(btn => {
          if (btn.textContent === ($("direction").value === "de-en" ? current.english : current.german)) {
            btn.classList.add("correct");
          }
        });
      }

      saveScore();
      updateScore();
      setTimeout(nextQuestion, 1200);
    }

    function saveScore() {
      localStorage.setItem("score", score);
      localStorage.setItem("total", total);
      localStorage.setItem("streak", streak);
      localStorage.setItem("best", best);
    }

    function updateScore() {
      $("score").textContent = score;
      $("total").textContent = total;
      $("streak").textContent = streak;
      $("best").textContent = best;
    }

    function resetScore() {
      score = 0;
      total = 0;
      streak = 0;
      best = 0;
      saveScore();
      updateScore();
    }

    $("level").onchange = nextQuestion;
    $("pos").onchange = nextQuestion;
    $("direction").onchange = nextQuestion;

    loadWords();
  </script>
</body>
</html>
