<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>German Vocabulary Trainer</title>
  <style>
    :root { --bg:#f7f7fb; --card:#fff; --ink:#1f2937; --muted:#6b7280; --line:#e5e7eb; }
    body { font-family: system-ui, -apple-system, Segoe UI, Arial, sans-serif; background:var(--bg); color:var(--ink); margin:0; }
    main { max-width: 850px; margin: 0 auto; padding: 22px; }
    .card { background:var(--card); border:1px solid var(--line); border-radius:18px; padding:22px; box-shadow:0 8px 24px rgba(0,0,0,.06); }
    h1 { margin:0 0 8px; font-size: clamp(28px, 5vw, 44px); }
    .sub { color:var(--muted); margin-top:0; }
    .controls { display:grid; grid-template-columns: repeat(auto-fit, minmax(150px,1fr)); gap:10px; margin:18px 0; }
    select, button { font:inherit; }
    select { width:100%; padding:10px; border-radius:12px; border:1px solid var(--line); background:white; }
    .question { margin-top:18px; padding:22px; border-radius:16px; border:1px dashed #cbd5e1; background:#fafafa; }
    #prompt { font-size: clamp(24px, 4vw, 36px); font-weight:800; margin:0 0 8px; }
    #hint, #example, #exampleEn { color:var(--muted); margin:6px 0; }
    #choices { display:grid; gap:10px; margin-top:16px; }
    button.choice { text-align:left; padding:14px 16px; border-radius:14px; border:1px solid var(--line); background:white; cursor:pointer; }
    button.choice:hover { transform: translateY(-1px); box-shadow:0 4px 12px rgba(0,0,0,.08); }
    button.correct { background:#dcfce7; border-color:#86efac; }
    button.wrong { background:#fee2e2; border-color:#fca5a5; }
    .stats { display:flex; flex-wrap:wrap; gap:12px; margin-top:16px; color:var(--muted); }
    .pill { background:#f3f4f6; border-radius:999px; padding:8px 12px; }
    .result { font-weight:700; min-height:28px; margin-top:12px; }
    .small { font-size: 13px; color:var(--muted); }
    .next { margin-top: 10px; padding:12px 16px; border:0; border-radius:12px; background:#111827; color:white; cursor:pointer; display:none; }
  </style>
</head>
<body>
<main>
  <div class="card">
    <h1>German Vocabulary Trainer</h1>
    <p class="sub">Multiple choice drills for vocabulary, sentences, noun articles, and noun plurals.</p>

    <div class="controls">
      <label>Mode
        <select id="mode">
          <option value="de-en">German → English</option>
          <option value="en-de">English → German</option>
          <option value="article">Article drill: der / die / das</option>
          <option value="plural">Plural drill</option>
          <option value="sentence">Sentence / phrase translation</option>
          <option value="example">Example sentence translation</option>
        </select>
      </label>
      <label>Level
        <select id="level">
          <option value="all">All levels</option>
          <option>A1</option><option>A2</option><option>B1</option><option>B2</option>
        </select>
      </label>
      <label>Type
        <select id="pos">
          <option value="all">All types</option>
          <option value="noun">Nouns</option>
          <option value="verb">Verbs</option>
          <option value="adjective">Adjectives</option>
          <option value="adverb">Adverbs</option>
          <option value="phrase">Phrases</option>
          <option value="sentence">Sentences</option>
        </select>
      </label>
      <label>Topic
        <select id="topic"><option value="all">All topics</option></select>
      </label>
    </div>

    <div class="question">
      <p id="prompt">Loading...</p>
      <p id="hint"></p>
      <p id="example"></p>
      <p id="exampleEn"></p>
      <div id="choices"></div>
      <button id="next" class="next">Next</button>
      <p id="result" class="result"></p>
    </div>

    <div class="stats">
      <span class="pill">Score: <b id="score">0</b>/<b id="total">0</b></span>
      <span class="pill">Streak: <b id="streak">0</b></span>
      <span class="pill">Words loaded: <b id="count">0</b></span>
    </div>

    <p class="small">Tip: Article and plural drills use noun entries only. Sentence modes use phrase/sentence/example fields.</p>
  </div>
</main>

<script>
let words = [];
let current = null;
let answer = "";
let locked = false;
let score = Number(localStorage.getItem("score") || 0);
let total = Number(localStorage.getItem("total") || 0);
let streak = Number(localStorage.getItem("streak") || 0);

const $ = id => document.getElementById(id);
$("score").textContent = score; $("total").textContent = total; $("streak").textContent = streak;

function shuffle(arr){ return arr.map(v=>[Math.random(),v]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]); }
function clean(s){ return (s || "").trim(); }

async function loadWords(){
  const res = await fetch("words.json");
  words = await res.json();
  $("count").textContent = words.length;
  populateTopics();
  nextQuestion();
}

function populateTopics(){
  const topics = [...new Set(words.map(w => w.topic).filter(Boolean))].sort();
  for (const t of topics) {
    const opt = document.createElement("option");
    opt.value = t; opt.textContent = t;
    $("topic").appendChild(opt);
  }
}

function filtered(){
  const level = $("level").value, pos = $("pos").value, topic = $("topic").value, mode = $("mode").value;
  return words.filter(w => {
    if(level !== "all" && w.level !== level) return false;
    if(pos !== "all" && w.pos !== pos) return false;
    if(topic !== "all" && w.topic !== topic) return false;
    if(mode === "article") return w.pos === "noun" && w.article && w.base;
    if(mode === "plural") return w.pos === "noun" && w.plural && w.base;
    if(mode === "sentence") return ["phrase","sentence"].includes(w.pos);
    if(mode === "example") return w.example && w.example_en;
    return true;
  });
}

function makeChoices(correct, pool, field, n=4){
  const wrong = shuffle(pool.map(w => clean(w[field])).filter(x => x && x !== correct));
  return shuffle([correct, ...[...new Set(wrong)].slice(0, n-1)]);
}

function nextQuestion(){
  locked = false;
  $("next").style.display = "none";
  $("result").textContent = "";
  $("exampleEn").textContent = "";
  const pool = filtered();
  if(pool.length < 3){
    $("prompt").textContent = "Not enough entries for this filter.";
    $("hint").textContent = "Try another mode, level, type, or topic.";
    $("choices").innerHTML = "";
    return;
  }
  current = pool[Math.floor(Math.random()*pool.length)];
  const mode = $("mode").value;
  let choices = [];

  if(mode === "article"){
    answer = current.article;
    $("prompt").textContent = current.base;
    $("hint").textContent = "Choose the correct article.";
    $("example").textContent = current.example ? "Example: " + current.example : "";
    choices = ["der","die","das"];
  } else if(mode === "plural"){
    answer = current.plural;
    $("prompt").textContent = `${current.article} ${current.base}`;
    $("hint").textContent = "Choose the plural form.";
    $("example").textContent = current.english ? "Meaning: " + current.english : "";
    choices = makeChoices(answer, words.filter(w=>w.pos==="noun" && w.plural), "plural");
  } else if(mode === "en-de"){
    answer = current.german;
    $("prompt").textContent = current.english;
    $("hint").textContent = "Choose the German translation.";
    $("example").textContent = current.example ? "Example: " + current.example : "";
    choices = makeChoices(answer, pool, "german");
  } else if(mode === "sentence"){
    answer = current.english;
    $("prompt").textContent = current.german;
    $("hint").textContent = "Choose the English translation.";
    $("example").textContent = current.example ? "Example: " + current.example : "";
    choices = makeChoices(answer, pool, "english");
  } else if(mode === "example"){
    answer = current.example_en;
    $("prompt").textContent = current.example;
    $("hint").textContent = "Choose the English translation of the example sentence.";
    $("example").textContent = current.german ? "Word/phrase: " + current.german : "";
    choices = makeChoices(answer, pool.filter(w=>w.example_en), "example_en");
  } else {
    answer = current.english;
    $("prompt").textContent = current.german;
    $("hint").textContent = `${current.level || ""} · ${current.pos || ""} · ${current.topic || ""}`;
    $("example").textContent = current.example ? "Example: " + current.example : "";
    choices = makeChoices(answer, pool, "english");
  }

  $("choices").innerHTML = "";
  for(const c of choices){
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = c;
    btn.onclick = () => choose(btn, c);
    $("choices").appendChild(btn);
  }
}

function choose(btn, choice){
  if(locked) return;
  locked = true;
  total++;
  const buttons = [...document.querySelectorAll("button.choice")];
  buttons.forEach(b => { if(b.textContent === answer) b.classList.add("correct"); });
  if(choice === answer){
    score++; streak++;
    btn.classList.add("correct");
    $("result").textContent = "Correct.";
  } else {
    streak = 0;
    btn.classList.add("wrong");
    $("result").textContent = "Wrong. Correct answer: " + answer;
  }
  if(current.example_en && $("mode").value !== "example"){
    $("exampleEn").textContent = "Example translation: " + current.example_en;
  }
  localStorage.setItem("score", score);
  localStorage.setItem("total", total);
  localStorage.setItem("streak", streak);
  $("score").textContent = score; $("total").textContent = total; $("streak").textContent = streak;
  $("next").style.display = "inline-block";
}

$("next").onclick = nextQuestion;
["mode","level","pos","topic"].forEach(id => $(id).onchange = nextQuestion);
loadWords();
</script>
</body>
</html>
